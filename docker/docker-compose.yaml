services:
  pulse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../config:/app/config
      - pulse_data:/app/data
    environment:
      - RUST_LOG=pulse=info
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - OPENWEATHER_KEY=${OPENWEATHER_KEY:-}
    restart: unless-stopped

  # Optional: RSSHub for Bilibili/Weibo/etc feeds
  rsshub:
    image: diygod/rsshub
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=600
      # For Bilibili: set BILIBILI_COOKIE_* values
      # See https://docs.rsshub.app/deploy/config#bilibili
    restart: unless-stopped
    profiles:
      - rsshub  # Only starts with: docker compose --profile rsshub up

  # Optional: local LLM
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai  # Only starts with: docker compose --profile ai up

volumes:
  pulse_data:
  ollama_data:
