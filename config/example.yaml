# Pulse — Personal Intelligence Dashboard
# Copy this file to config/default.yaml and customize it.

server:
  host: "0.0.0.0"
  port: 8080

database:
  path: "./data/pulse.db"
  retention_days: 30

# --- Data Sources ---
collectors:
  rss:
    enabled: true
    interval: "30m"
    feeds:
      - name: "Hacker News"
        url: "https://hnrss.org/frontpage"
      - name: "TechCrunch"
        url: "https://techcrunch.com/feed/"
      - name: "Rust Blog"
        url: "https://blog.rust-lang.org/feed.xml"
      - name: "Ars Technica"
        url: "https://feeds.arstechnica.com/arstechnica/technology-lab"
      - name: "The Verge"
        url: "https://www.theverge.com/rss/index.xml"
      - name: "Lobsters"
        url: "https://lobste.rs/rss"
      # Add your own feeds here:
      # - name: "My Favorite Blog"
      #   url: "https://example.com/feed.xml"

  hackernews:
    enabled: true
    interval: "15m"
    min_score: 50  # Only fetch stories with 50+ points

  # reddit:
  #   enabled: true
  #   interval: "30m"
  #   subreddits:
  #     - "rust"
  #     - "selfhosted"
  #     - "machinelearning"

  stocks:
    enabled: true
    interval: "5m"
    symbols: ["AAPL", "GOOGL", "MSFT", "NVDA", "AMZN", "META", "TSLA"]

  weather:
    enabled: true
    interval: "1h"
    location: "San Francisco"

  # github:
  #   enabled: false
  #   interval: "6h"
  #   watch_repos:
  #     - "tokio-rs/axum"
  #   trending_languages: ["rust", "typescript"]

# --- AI Intelligence (Phase 3) ---
intelligence:
  enabled: false

  # local:
  #   enabled: true
  #   provider: "ollama"
  #   model: "llama3:8b"
  #   endpoint: "http://localhost:11434"
  #   relevance_threshold: 4

  # remote:
  #   enabled: true
  #   provider: "claude"
  #   model: "claude-sonnet-4-20250514"
  #   api_key: "${CLAUDE_API_KEY}"
  #   max_daily_calls: 100
  #   batch_size: 10

# --- Interest Profiles ---
# These are used by the intelligence layer to score items.
# Write them in natural language — the LLM interprets them.
interests:
  - name: "AI & ML"
    description: "Developments in AI, new model releases, research breakthroughs, industry impact"
    priority: high

  - name: "Rust Ecosystem"
    description: "New crates, language updates, interesting Rust projects"
    priority: medium

# --- Dashboard Layout ---
dashboard:
  theme: "dark"
  refresh_interval: "60s"
  widgets:
    - type: "news_feed"
      position: { x: 0, y: 0, w: 8, h: 6 }
    - type: "collector_status"
      position: { x: 8, y: 0, w: 4, h: 3 }
